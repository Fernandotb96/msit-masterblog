<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>

    <div class="nav-container">
        <a href="{{ url_for('add_post') }}" class="btn-add">Create a new post</a>
    </div>

    {% for blog in posts %}
        <div class="post">
            <h2>{{blog.title}}</h2>
            <p><em>Written by {{blog.author}}</em></p>
            <p>{{blog.content}}</p>

            <div class="post-actions">
                <a href="{{ url_for('update_post', post_id=blog.id) }}" class="btn-action btn-update">Edit</a>
                <form action="{{ url_for('delete_post', post_id=blog.id) }}" method="POST" style="display: inline;"
                      onsubmit="return confirm('Are you sure you want to delete this post?');">
                    <button type="submit" class="btn-action btn-delete">Delete</button>
                </form>
            </div>
        </div>
    {% endfor %}

</body>
</html>
