<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>Create a new post</h1>

        <form action="{{ url_for('add_post') }}" method="POST">
            <div class="form-group">
                <label for="title">Title of the post:</label>
                <input type="text" id="title" name="title" placeholder="Introduce a good title" required>
            </div>

            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" placeholder="Your name or alias" required>
            </div>

            <div class="form-group">
                <label for="content">Content:</label>
                <textarea id="content" name="content" rows="6" placeholder="Introduce your opinion" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Post</button>
        </form>

        <p><a href="/">⬅ Go Home</a></p>
    </div>

</body>
</html>
