<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Edit Post</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="form-container">
        <h1>Edit Post</h1>

        <form action="{{ url_for('update_post', post_id=post.id) }}" method="POST">
            <div class="form-group">
                <label for="title">Title of the post:</label>
                <input type="text" id="title" name="title" value="{{ post.title }}" required>
            </div>

            <div class="form-group">
                <label for="author">Author:</label>
                <input type="text" id="author" name="author" value="{{ post.author }}" required>
            </div>

            <div class="form-group">
                <label for="content">Content:</label>
                <textarea id="content" name="content" rows="6" required>{{ post.content }}</textarea>
            </div>

            <button type="submit" class="btn-submit">Save changes</button>
        </form>

        <p><a href="/">⬅ Cancel and go back</a></p>
    </div>
</body>
</html>
